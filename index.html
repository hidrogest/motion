<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HidroStudio</title>
  
  <!-- Load React and ReactDOM from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Load Babel to compile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Load Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* Reset and basic styles that were in your CSS variable */
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; background-color: #060E15; }

    :root {
      --lb: #55BBDF; --db: #153D56; --dt: #00524D;
      --mg: #659368; --ls: #CFDDBA; --wh: #FFFFFF;
      --bg: #060E15;
    }

    /* ── PARTICLE FLOAT ── */
    @keyframes pFloat {
      0%   { transform: translateY(0px) translateX(0px) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-120px) translateX(var(--px, 20px)) scale(0.3); opacity: 0; }
    }

    /* ── LIQUID RIPPLE ── */
    @keyframes ripple {
      0%   { transform: scale(0.1); opacity: 0.9; }
      100% { transform: scale(4);   opacity: 0; }
    }

    /* ── CHROMATIC ABERRATION FLICKER ── */
    @keyframes chromAb {
      0%,100% { text-shadow: -1px 0 rgba(255,0,80,.7), 1px 0 rgba(0,200,255,.7); filter: blur(0); }
      25%      { text-shadow: -3px 0 rgba(255,0,80,.9), 3px 0 rgba(0,200,255,.9); filter: blur(0.5px); }
      50%      { text-shadow: 0 0 0 transparent; filter: blur(0); }
      75%      { text-shadow: -2px 1px rgba(255,0,80,.6), 2px -1px rgba(0,200,255,.6); }
    }

    /* ── GLITCH ── */
    @keyframes glitch {
      0%,100% { clip-path: inset(0 0 100% 0); transform: translateX(0); }
      10%      { clip-path: inset(20% 0 70% 0); transform: translateX(-4px); }
      20%      { clip-path: inset(50% 0 30% 0); transform: translateX(4px); }
      30%      { clip-path: inset(80% 0 5% 0);  transform: translateX(-2px); }
      40%      { clip-path: inset(10% 0 60% 0); transform: translateX(3px); }
      50%      { clip-path: inset(0 0 100% 0);  transform: translateX(0); }
    }

    /* ── SCANLINES ── */
    @keyframes scan {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100%; }
    }

    /* ── SCENE TRANSITIONS ── */
    @keyframes sceneIn {
      0%   { opacity: 0; filter: blur(20px) brightness(3); transform: scale(1.05); }
      100% { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }
    }
    @keyframes sceneOut {
      0%   { opacity: 1; filter: blur(0) brightness(1); }
      100% { opacity: 0; filter: blur(30px) brightness(0); }
    }

    /* ── ICONS ── */
    @keyframes iconPulse {
      0%,100% { filter: drop-shadow(0 0 6px rgba(85,187,223,.4)); transform: scale(1); }
      50%      { filter: drop-shadow(0 0 24px rgba(85,187,223,.9)); transform: scale(1.04); }
    }
    @keyframes iconBounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    @keyframes iconSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes iconSpinRev {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    @keyframes iconFloat {
      0%   { transform: translateY(60px) scale(0.7); opacity: 0; }
      30%  { opacity: 1; }
      70%  { opacity: 0.7; }
      100% { transform: translateY(-60px) scale(0.5); opacity: 0; }
    }
    @keyframes iconRain {
      0%   { transform: translateY(-80px); opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(160px); opacity: 0; }
    }
    @keyframes moneyFly {
      0%   { transform: translate(-180px, 20px) rotate(-15deg) scale(0.5); opacity: 0; }
      20%  { opacity: 1; }
      50%  { transform: translate(0px, -10px) rotate(5deg) scale(1.1); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translate(180px, 30px) rotate(20deg) scale(0.4); opacity: 0; }
    }
    @keyframes buildingRise {
      0%   { transform: translateY(120px) scale(0.6); opacity: 0; filter: blur(8px); }
      100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
    }
    @keyframes checkPop {
      0%   { transform: scale(0) rotate(-45deg); opacity: 0; }
      60%  { transform: scale(1.3) rotate(8deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    @keyframes warnShake {
      0%,100% { transform: rotate(0) scale(1); filter: drop-shadow(0 0 0 transparent); }
      20%      { transform: rotate(-8deg) scale(1.05); filter: drop-shadow(0 0 20px rgba(255,100,50,.8)); }
      40%      { transform: rotate(8deg) scale(1.08); }
      60%      { transform: rotate(-4deg) scale(1.04); filter: drop-shadow(0 0 30px rgba(85,187,223,.9)); }
      80%      { transform: rotate(4deg); }
    }
    @keyframes chartFall {
      0%   { transform: scaleY(1) skewX(0); opacity: 1; filter: drop-shadow(0 0 0 transparent); }
      40%  { transform: scaleY(0.6) skewX(-5deg); filter: drop-shadow(0 0 20px rgba(255,60,60,.8)); }
      100% { transform: scaleY(0.05) skewX(10deg); opacity: 0.3; filter: drop-shadow(0 0 40px rgba(255,0,0,.5)); }
    }
    @keyframes docFall {
      0%   { transform: translate(0, -200px) rotate(0); opacity: 0; }
      20%  { transform: translate(10px, -80px) rotate(8deg); opacity: 1; }
      60%  { transform: translate(-5px, 40px) rotate(-6deg); opacity: 1; }
      100% { transform: translate(15px, 140px) rotate(15deg) scale(0); opacity: 0; }
    }
    @keyframes folderSlide {
      0%   { transform: translate(-160px, 60px) scale(0.9); opacity: 0; }
      40%  { transform: translate(-20px, 10px) scale(1); opacity: 1; }
      80%  { transform: translate(20px, -30px) scale(0.6); opacity: 0.7; }
      100% { transform: translate(30px, -50px) scale(0); opacity: 0; }
    }
    @keyframes lockSnap {
      0%   { transform: scale(4) translateY(-60px); opacity: 0; filter: blur(12px); }
      60%  { transform: scale(0.85); opacity: 1; filter: blur(0); }
      80%  { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes gemExplode {
      0%   { transform: scale(1) rotate(0); filter: drop-shadow(0 0 30px rgba(207,221,186,.9)); opacity: 1; }
      30%  { transform: scale(1.4) rotate(20deg); filter: drop-shadow(0 0 80px rgba(85,187,223,1)) brightness(2); }
      100% { transform: scale(0) rotate(-90deg); filter: blur(30px); opacity: 0; }
    }
    @keyframes crossReveal {
      0%,50% { transform: scale(0.2) rotate(45deg); opacity: 0; filter: blur(20px); }
      100%   { transform: scale(1) rotate(0); opacity: 1; filter: blur(0); }
    }

    /* ── AURA / GLOW PULSE ── */
    @keyframes auraPulse {
      0%,100% { opacity: 0.15; transform: scale(1); }
      50%     { opacity: 0.45; transform: scale(1.2); }
    }

    /* ── HOLOGRAM LINES ── */
    @keyframes holoScan {
      0%   { transform: translateY(-100%); opacity: 0.6; }
      100% { transform: translateY(400%); opacity: 0; }
    }

    /* ── TEXT REVEAL ── */
    @keyframes textReveal {
      0%   { clip-path: inset(0 100% 0 0); opacity: 0; }
      100% { clip-path: inset(0 0% 0 0); opacity: 1; }
    }

    /* ── BREATHE ── */
    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.06); }
    }

    /* ── NOISE TEXTURE ── */
    .noise::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.06;
      mix-blend-mode: overlay;
    }

    /* ── SCANLINES OVERLAY ── */
    .scanlines::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 99;
    }

    /* ── VIGNETTE ── */
    .vignette::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 98;
    }

    /* ── SCENE WRAPPER ── */
    .scene-wrapper {
      position: absolute;
      inset: 0;
      animation: sceneIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── PROGRESS BAR ── */
    .prog-bar {
      background: linear-gradient(90deg, var(--lb) 0%, rgba(85,187,223,0.3) 100%);
      box-shadow: 0 0 12px rgba(85,187,223,0.7);
    }

    /* ── BUTTONS ── */
    .btn-primary {
      background: linear-gradient(135deg, #55BBDF 0%, #2E8FAF 100%);
      color: #0a1c27;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: 0 0 0 1px rgba(85,187,223,.3), 0 8px 32px rgba(85,187,223,.25);
      transition: all .25s;
    }
    .btn-primary:hover {
      box-shadow: 0 0 0 1px rgba(85,187,223,.6), 0 12px 48px rgba(85,187,223,.45);
      transform: scale(1.03);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }

    /* ── SCENE GRID ── */
    .scene-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 600;
      transition: all .2s;
    }
    .scene-btn.active {
      background: rgba(85,187,223,.25);
      color: #55BBDF;
      border: 1px solid rgba(85,187,223,.5);
      box-shadow: 0 0 12px rgba(85,187,223,.3);
    }
    .scene-btn:not(.active) {
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.4);
      border: 1px solid rgba(255,255,255,.08);
    }
    .scene-btn:not(.active):hover {
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.7);
    }

    .hoverbar { transition: opacity .3s; } 
    .hoverbar:hover { opacity: 1 !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // Componente de ícone dinâmico usando Lucide
    const Icon = ({ name, size = 24, color = 'currentColor', fill = 'none', style = {}, className = '' }) => {
        const iconRef = useRef(null);

        useEffect(() => {
            if (iconRef.current) {
                // Remove qualquer conteúdo anterior
                iconRef.current.innerHTML = '';
                
                // Converte o nome do componente (ex: CircleDollarSign) para o formato do lucide (circle-dollar-sign)
                const kebabCaseName = name.replace(/([a-z0-9]|(?=[A-Z]))([A-Z])/g, '$1-$2').toLowerCase().replace(/^-/, '');
                
                // Cria o ícone SVG
                const iconElement = document.createElement('i');
                iconElement.setAttribute('data-lucide', kebabCaseName);
                iconElement.style.width = `${size}px`;
                iconElement.style.height = `${size}px`;
                iconElement.style.color = color;
                iconElement.style.fill = fill;
                
                iconRef.current.appendChild(iconElement);
                lucide.createIcons({ root: iconRef.current });
            }
        }, [name, size, color, fill]);

        // Retorna um wrapper que recebe os estilos
        return <span ref={iconRef} style={{ display: 'inline-block', width: size, height: size, ...style }} className={className}></span>;
    };

    // ─── PALETA ───────────────────────────────────────────────────────────────────
    const C = {
      lb: '#55BBDF',   // lightBlue
      db: '#153D56',   // darkBlue
      dt: '#00524D',   // darkTeal
      mg: '#659368',   // mutedGreen
      ls: '#CFDDBA',   // lightSage
      wh: '#FFFFFF',
      bg: '#060E15',   // ultra-dark bg
    };

    // ─── PARTICLES ────────────────────────────────────────────────────────────────
    const PARTICLES = Array.from({ length: 28 }).map((_, i) => ({
      id: i,
      left: `${5 + Math.random() * 90}%`,
      top: `${10 + Math.random() * 80}%`,
      size: 2 + Math.random() * 4,
      delay: `${Math.random() * 5}s`,
      dur: `${3 + Math.random() * 4}s`,
      px: `${(Math.random() - 0.5) * 60}px`,
      color: Math.random() > 0.5 ? C.lb : C.ls,
    }));

    // ─── RIPPLES ──────────────────────────────────────────────────────────────────
    const RIPPLES = Array.from({ length: 12 }).map((_, i) => ({
      id: i,
      left: `${10 + Math.random() * 80}%`,
      top: `${15 + Math.random() * 70}%`,
      delay: `${Math.random() * 5}s`,
      dur: `${3 + Math.random() * 3}s`,
      size: 50 + Math.random() * 80,
    }));

    // ─── SHARED OVERLAYS ──────────────────────────────────────────────────────────
    const Atmosphere = () => (
      <React.Fragment>
        {/* Particles */}
        <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 40 }}>
          {PARTICLES.map(p => (
            <div key={p.id} style={{
              position: 'absolute', left: p.left, top: p.top,
              width: p.size, height: p.size,
              borderRadius: '50%',
              background: p.color,
              boxShadow: `0 0 ${p.size * 3}px ${p.color}`,
              animation: `pFloat ${p.dur} ease-in-out ${p.delay} infinite`,
              '--px': p.px,
            }} />
          ))}
        </div>
        {/* Ripples */}
        <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 41 }}>
          {RIPPLES.map(r => (
            <div key={r.id} style={{
              position: 'absolute',
              left: r.left, top: r.top,
              width: r.size, height: r.size,
              marginLeft: -r.size / 2, marginTop: -r.size / 2,
              borderRadius: '50%',
              border: `1.5px solid rgba(85,187,223,0.35)`,
              animation: `ripple ${r.dur} ease-out ${r.delay} infinite`,
            }} />
          ))}
        </div>
      </React.Fragment>
    );

    // Hologram scan line
    const HoloLine = ({ delay = '0s' }) => (
      <div style={{
        position: 'absolute', left: 0, right: 0, height: 2,
        background: 'linear-gradient(90deg, transparent, rgba(85,187,223,0.6), transparent)',
        animation: `holoScan 4s ease-in-out ${delay} infinite`,
        zIndex: 44, pointerEvents: 'none',
      }} />
    );

    // Aura blob
    const Aura = ({ color = C.lb, size = 200, cx = '50%', cy = '50%', delay = '0s' }) => (
      <div style={{
        position: 'absolute', left: cx, top: cy,
        width: size, height: size,
        marginLeft: -size / 2, marginTop: -size / 2,
        borderRadius: '50%',
        background: color,
        filter: 'blur(60px)',
        animation: `auraPulse 3s ease-in-out ${delay} infinite`,
        zIndex: 1, pointerEvents: 'none',
      }} />
    );

    // ─── 12 CENAS ─────────────────────────────────────────────────────────────────
    const scenes = [
      { id: 0, title: 'A Dúvida',       start: 0,    duration: 5.0 },
      { id: 1, title: 'A Bacia',        start: 5.0,  duration: 5.0 },
      { id: 2, title: 'O Custo Cego',   start: 10.0, duration: 6.0 },
      { id: 3, title: 'O Órgão',        start: 16.0, duration: 5.0 },
      { id: 4, title: 'O Mercado',       start: 21.0, duration: 4.6 },
      { id: 5, title: 'Cumprir Tabela', start: 25.6, duration: 4.4 },
      { id: 6, title: 'Papel',          start: 30.0, duration: 5.0 },
      { id: 7, title: 'Falsa Medição',  start: 35.0, duration: 4.0 },
      { id: 8, title: 'Lixo',           start: 39.0, duration: 4.0 },
      { id: 9, title: 'Gaveta',         start: 43.0, duration: 4.2 },
      { id: 10, title: 'Sem Acesso',    start: 47.2, duration: 5.2 },
      { id: 11, title: 'A Perda',       start: 52.4, duration: 5.8 },
    ];
    const TOTAL = 58.2;

    // ─── SCENE COMPONENTS ─────────────────────────────────────────────────────────
    const Scene0 = () => (
      <div className="scene-wrapper" style={{ background: `radial-gradient(ellipse at 50% 60%, #0d2d42 0%, ${C.bg} 75%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', overflow: 'hidden' }}>
        <Atmosphere />
        <Aura color={C.lb} size={280} cx="50%" cy="55%" delay="0s" />
        <HoloLine delay="0.5s" />
        <div style={{ position: 'relative', zIndex: 10 }}>
          <Icon name="Brain" size={130} color={C.lb} style={{ animation: 'breathe 3s ease-in-out infinite, iconPulse 2.5s ease-in-out infinite', filter: `drop-shadow(0 0 30px ${C.lb})` }} />
        </div>
        {[0, 0.6, 1.2].map((d, i) => (
          <Icon name="HelpCircle" key={i} size={28 + i * 10}
            style={{
              position: 'absolute', zIndex: 12,
              left: `${20 + i * 30}%`, top: `${25 + i * 15}%`,
              color: [C.ls, C.mg, C.wh][i],
              animation: `iconFloat ${2.5 + i * 0.4}s ease-in-out ${d}s infinite`,
              filter: `drop-shadow(0 0 8px ${[C.ls, C.mg, C.wh][i]})`,
            }}
          />
        ))}
        <div style={{
          position: 'absolute', bottom: 40, zIndex: 15,
          fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 14,
          color: C.lb, letterSpacing: '0.3em', textTransform: 'uppercase',
          animation: 'chromAb 3s ease-in-out infinite',
        }}>ANALISANDO</div>
      </div>
    );

    const Scene1 = () => (
      <div className="scene-wrapper" style={{ background: `linear-gradient(180deg, #061824 0%, #0a2535 50%, #0d3245 100%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <Aura color={C.dt} size={320} cx="50%" cy="50%" delay="1s" />
        <HoloLine delay="1s" />
        <HoloLine delay="2.5s" />
        {[0, 0.5, 1.0].map((d, i) => (
          <Icon name="Droplets" key={i} size={30 + i * 12} style={{
            position: 'absolute', top: -20, left: `${25 + i * 25}%`, zIndex: 15,
            color: C.lb, animation: `iconRain ${1.8 + i * 0.3}s linear ${d}s infinite`,
            filter: `drop-shadow(0 0 10px ${C.lb})`,
          }} />
        ))}
        <div style={{ position: 'relative', zIndex: 10, filter: `drop-shadow(0 20px 40px rgba(0,82,77,.7))` }}>
          <Icon name="Map" size={170} color={C.dt} fill={C.ls} style={{ animation: 'breathe 4s ease-in-out infinite' }} />
        </div>
        <div style={{
          position: 'absolute', inset: 0, zIndex: 5,
          background: 'radial-gradient(ellipse at 50% 80%, rgba(85,187,223,.08) 0%, transparent 70%)',
        }} />
      </div>
    );

    const Scene2 = () => (
      <div className="scene-wrapper" style={{ background: `radial-gradient(ellipse at 30% 50%, #1a2e1a 0%, ${C.bg} 70%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <Aura color={C.mg} size={240} cx="50%" cy="50%" delay="0.5s" />
        <Icon name="EyeOff" size={200} style={{ position: 'absolute', color: C.mg, opacity: 0.12, zIndex: 2, animation: 'breathe 5s ease-in-out infinite' }} />
        {[{ d: '0s', size: 90, top: '35%' }, { d: '0.7s', size: 65, top: '55%' }, { d: '1.4s', size: 50, top: '45%' }].map((p, i) => (
          <Icon name="CircleDollarSign" key={i} size={p.size} style={{
            position: 'absolute', zIndex: 12, top: p.top,
            color: [C.ls, C.lb, C.mg][i],
            fill: C.dt,
            animation: `moneyFly ${3 + i * 0.5}s ease-in-out ${p.d} infinite`,
            filter: `drop-shadow(0 0 ${12 + i * 4}px ${[C.ls, C.lb, C.mg][i]})`,
          }} />
        ))}
      </div>
    );

    const Scene3 = () => (
      <div className="scene-wrapper" style={{ background: `linear-gradient(160deg, #003530 0%, #001a18 100%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <Aura color={C.dt} size={350} cx="50%" cy="60%" delay="0s" />
        <HoloLine delay="0s" />
        <div style={{ position: 'relative', zIndex: 10, animation: 'buildingRise 1.1s cubic-bezier(.22,1,.36,1) forwards' }}>
          <Icon name="Building2" size={190} color={C.wh} style={{ filter: 'drop-shadow(0 0 40px rgba(255,255,255,.25))' }} />
        </div>
        <Icon name="Search" size={80} style={{
          position: 'absolute', bottom: '18%', right: '15%', zIndex: 15,
          color: C.ls,
          animation: `iconPulse 2s ease-in-out infinite`,
          filter: `drop-shadow(0 0 18px ${C.ls})`,
        }} />
        <div style={{
          position: 'absolute', inset: 0,
          background: 'repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(85,187,223,.015) 3px, rgba(85,187,223,.015) 4px)',
          zIndex: 6, pointerEvents: 'none',
        }} />
      </div>
    );

    const Scene4 = () => (
      <div className="scene-wrapper" style={{ background: `radial-gradient(ellipse at 50% 50%, #0d2035 0%, ${C.bg} 80%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <Aura color={C.lb} size={260} cx="35%" cy="40%" delay="0s" />
        <Aura color={C.mg} size={180} cx="65%" cy="65%" delay="1.5s" />
        <Icon name="Cog" size={140} style={{
          position: 'absolute', left: '10%', top: '15%', zIndex: 10,
          color: C.lb, animation: 'iconSpin 5s linear infinite',
          filter: `drop-shadow(0 0 20px ${C.lb})`,
        }} />
        <Icon name="Cog" size={95} style={{
          position: 'absolute', right: '12%', top: '30%', zIndex: 10,
          color: C.mg, animation: 'iconSpinRev 4s linear infinite',
          filter: `drop-shadow(0 0 14px ${C.mg})`,
        }} />
        <Icon name="Cog" size={70} style={{
          position: 'absolute', left: '30%', bottom: '20%', zIndex: 10,
          color: C.ls, animation: 'iconSpin 3s linear infinite',
          filter: `drop-shadow(0 0 10px ${C.ls})`,
        }} />
        {/* Mesh connection lines (SVG overlay) */}
        <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', zIndex: 8, opacity: 0.25 }}>
          <line x1="25%" y1="30%" x2="75%" y2="55%" stroke={C.lb} strokeWidth="1" strokeDasharray="4 4" />
          <line x1="55%" y1="55%" x2="40%" y2="75%" stroke={C.mg} strokeWidth="1" strokeDasharray="4 4" />
        </svg>
      </div>
    );

    const CheckItem = ({ delay }) => {
      const [show, setShow] = useState(false);
      useEffect(() => {
        const t = setTimeout(() => setShow(true), parseFloat(delay) * 1000);
        return () => clearTimeout(t);
      }, [delay]);
      return show ? (
        <Icon name="CheckCircle" size={36} style={{
          color: C.ls, filter: `drop-shadow(0 0 12px ${C.ls})`,
          animation: 'checkPop .5s cubic-bezier(.175,.885,.32,1.275) forwards',
        }} />
      ) : <div style={{ width: 36, height: 36 }} />;
    };

    const Scene5 = () => (
      <div className="scene-wrapper" style={{ background: `linear-gradient(160deg, #0d2035 0%, ${C.bg} 100%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <Aura color={C.lb} size={200} cx="50%" cy="45%" delay="0.3s" />
        <div style={{ position: 'relative', zIndex: 10, animation: 'buildingRise .8s ease-out forwards' }}>
          <Icon name="ClipboardList" size={165} color={C.lb} style={{ filter: `drop-shadow(0 0 25px ${C.lb})` }} />
          <div style={{ position: 'absolute', top: '22%', left: '52%', display: 'flex', flexDirection: 'column', gap: 10 }}>
            {['300ms', '700ms', '1100ms'].map((d, i) => <CheckItem key={i} delay={d} />)}
          </div>
        </div>
      </div>
    );

    const Scene6 = () => (
      <div className="scene-wrapper" style={{ background: `radial-gradient(ellipse at 50% 45%, #1a0a0a 0%, ${C.bg} 70%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <div style={{ position: 'absolute', width: 300, height: 300, borderRadius: '50%', background: 'rgba(200,50,50,.12)', filter: 'blur(50px)', animation: 'auraPulse 2.5s ease-in-out infinite', zIndex: 2 }} />
        <Icon name="FileWarning" size={160} style={{
          position: 'relative', zIndex: 10,
          color: C.ls, animation: 'warnShake 2.5s ease-in-out infinite',
          filter: `drop-shadow(0 0 25px ${C.ls}) drop-shadow(0 0 60px rgba(255,120,50,.4))`,
        }} />
        <HoloLine delay="0s" />
        <HoloLine delay="2s" />
      </div>
    );

    const Scene7 = () => (
      <div className="scene-wrapper" style={{ background: `linear-gradient(180deg, #0d2035 0%, #060810 100%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <Aura color="rgba(255,50,50,.6)" size={220} cx="50%" cy="60%" delay="0s" />
        <Icon name="BarChartBig" size={180} style={{
          position: 'relative', zIndex: 10,
          color: C.lb,
          transformOrigin: 'bottom center',
          animation: 'chartFall 2s cubic-bezier(.55,0,1,.45) forwards',
          filter: `drop-shadow(0 0 20px ${C.lb})`,
        }} />
      </div>
    );

    const Scene8 = () => (
      <div className="scene-wrapper" style={{ background: `linear-gradient(180deg, #061020 0%, #04080f 100%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <Icon name="FileText" size={95} style={{
          position: 'absolute', top: '8%', zIndex: 12,
          color: C.ls, animation: 'docFall 2.2s ease-in forwards',
          filter: `drop-shadow(0 0 15px ${C.ls})`,
        }} />
        <Icon name="Trash2" size={155} style={{
          position: 'absolute', bottom: '15%', zIndex: 10,
          color: C.mg, filter: `drop-shadow(0 0 25px ${C.mg})`,
          animation: 'breathe 3s ease-in-out infinite',
        }} />
      </div>
    );

    const Scene9 = () => (
      <div className="scene-wrapper" style={{ background: `radial-gradient(ellipse at 50% 60%, #101d2e 0%, ${C.bg} 75%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <Aura color={C.dt} size={240} cx="55%" cy="55%" delay="0s" />
        <Icon name="FileText" size={75} style={{
          position: 'absolute', zIndex: 12,
          color: C.lb, animation: 'folderSlide 2s ease-in-out forwards',
          filter: `drop-shadow(0 0 14px ${C.lb})`,
        }} />
        <Icon name="FolderOpen" size={175} style={{
          position: 'relative', zIndex: 8,
          color: C.dt, fill: C.bg,
          filter: `drop-shadow(0 0 20px ${C.dt}) drop-shadow(0 10px 40px rgba(0,0,0,.7))`,
          animation: 'breathe 4s ease-in-out infinite',
        }} />
      </div>
    );

    const Scene10 = () => (
      <div className="scene-wrapper" style={{ background: `radial-gradient(ellipse at 50% 50%, #0a1a2a 0%, ${C.bg} 75%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <HoloLine delay="0s" />
        <HoloLine delay="1.8s" />
        <Icon name="FolderOpen" size={175} style={{ position: 'relative', zIndex: 8, color: C.dt, opacity: 0.5 }} />
        <Icon name="Lock" size={120} style={{
          position: 'absolute', zIndex: 15,
          color: C.wh, fill: C.mg,
          animation: 'lockSnap .7s cubic-bezier(.175,.885,.32,1.275) .3s forwards',
          opacity: 0,
          filter: `drop-shadow(0 0 30px ${C.lb}) drop-shadow(0 0 80px rgba(85,187,223,.4))`,
        }} />
      </div>
    );

    const Scene11 = () => (
      <div className="scene-wrapper" style={{ background: `radial-gradient(ellipse at 50% 50%, #111a0a 0%, ${C.bg} 70%)`, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <Atmosphere />
        <Aura color={C.ls} size={300} cx="50%" cy="50%" delay="0s" />
        <Icon name="Gem" size={190} style={{
          position: 'absolute', zIndex: 14,
          color: C.ls,
          animation: 'gemExplode 2s ease-in forwards',
          filter: `drop-shadow(0 0 50px ${C.ls}) drop-shadow(0 0 100px rgba(207,221,186,.7))`,
        }} />
        <Icon name="XCircle" size={210} style={{
          position: 'absolute', zIndex: 12,
          color: C.lb, strokeWidth: 1.5,
          animation: 'crossReveal 2.5s ease-out forwards',
          opacity: 0,
          filter: `drop-shadow(0 0 40px ${C.lb})`,
        }} />
      </div>
    );

    const SCENE_COMPONENTS = [
      Scene0, Scene1, Scene2, Scene3, Scene4, Scene5,
      Scene6, Scene7, Scene8, Scene9, Scene10, Scene11,
    ];

    // ─── MAIN APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState('idle'); // idle | loading | ready
      const [progress, setProgress] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [currentScene, setCurrentScene] = useState(0);
      const [fullscreen, setFullscreen] = useState(false);
      const [sceneKey, setSceneKey] = useState(0); // force remount on scene change

      // progress bar
      useEffect(() => {
        if (phase !== 'loading') return;
        const iv = setInterval(() => {
          setProgress(p => {
            if (p >= 100) { clearInterval(iv); setPhase('ready'); return 100; }
            return p + 2.5;
          });
        }, 35);
        return () => clearInterval(iv);
      }, [phase]);

      // playback
      useEffect(() => {
        if (!isPlaying || phase !== 'ready') return;
        const iv = setInterval(() => {
          setCurrentTime(t => {
            if (t >= TOTAL) { setIsPlaying(false); return TOTAL; }
            return +(t + 0.1).toFixed(1);
          });
        }, 100);
        return () => clearInterval(iv);
      }, [isPlaying, phase]);

      // scene detection
      useEffect(() => {
        let next = 0;
        for (let i = 0; i < scenes.length; i++) {
          if (currentTime >= scenes[i].start) next = i;
        }
        if (next !== currentScene) {
          setCurrentScene(next);
          setSceneKey(k => k + 1);
        }
      }, [currentTime, currentScene]);

      const jumpTo = useCallback((idx) => {
        setCurrentTime(scenes[idx].start);
        setCurrentScene(idx);
        setSceneKey(k => k + 1);
        setIsPlaying(false);
      }, []);

      const togglePlay = () => {
        if (currentTime >= TOTAL) { setCurrentTime(0); setCurrentScene(0); setSceneKey(k => k + 1); }
        setIsPlaying(v => !v);
      };

      const reset = () => { setIsPlaying(false); setCurrentTime(0); setCurrentScene(0); setSceneKey(k => k + 1); };

      const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(Math.floor(s % 60)).padStart(2, '0')}`;

      const SceneCmp = SCENE_COMPONENTS[currentScene];

      // ── PREVIEW PHONE ──
      const PhonePreview = () => (
        <div style={{
          width: 300, flexShrink: 0,
          borderRadius: 40, border: `10px solid ${C.dt}`,
          overflow: 'hidden', background: C.bg,
          boxShadow: `0 40px 80px rgba(0,0,0,.8), 0 0 0 1px rgba(85,187,223,.15), inset 0 0 0 1px rgba(255,255,255,.05)`,
          aspectRatio: '9/16',
          display: 'flex', flexDirection: 'column',
          position: 'relative',
        }} className="noise scanlines vignette">
          {/* notch */}
          <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', width: 110, height: 20, background: C.dt, borderRadius: '0 0 14px 14px', zIndex: 200 }} />

          {/* scene area */}
          <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
            {phase === 'idle' && (
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
                <Icon name="Play" size={64} color={C.lb} style={{ filter: `drop-shadow(0 0 20px ${C.lb})`, opacity: .6 }} />
                <p style={{ fontFamily: "'Space Grotesk'", fontSize: 11, color: 'rgba(255,255,255,.35)', letterSpacing: '0.1em' }}>AGUARDANDO RENDER</p>
              </div>
            )}
            {phase === 'loading' && (
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, padding: 32 }}>
                <div style={{ width: '100%', height: 3, background: 'rgba(255,255,255,.08)', borderRadius: 99, overflow: 'hidden' }}>
                  <div className="prog-bar" style={{ height: '100%', width: `${progress}%`, borderRadius: 99, transition: 'width .08s linear' }} />
                </div>
                <p style={{ fontFamily: "'Space Grotesk'", fontSize: 10, color: C.lb, letterSpacing: '0.2em' }}>PROCESSANDO {Math.round(progress)}%</p>
              </div>
            )}
            {phase === 'ready' && <SceneCmp key={`${currentScene}-${sceneKey}`} />}
          </div>
        </div>
      );

      // ── CONTROLS ──
      const Controls = ({ compact = false }) => phase === 'ready' && (
        <div style={{
          width: compact ? '100%' : 310,
          background: 'rgba(0,0,0,.55)',
          backdropFilter: 'blur(20px)',
          borderRadius: 24, border: '1px solid rgba(85,187,223,.15)',
          padding: '14px 18px',
          boxShadow: '0 8px 40px rgba(0,0,0,.5)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
            <button onClick={togglePlay} style={{
              width: 42, height: 42, borderRadius: '50%',
              background: `linear-gradient(135deg, ${C.lb}, #2e8faf)`,
              border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              boxShadow: `0 0 20px rgba(85,187,223,.5)`,
              flexShrink: 0,
              transition: 'transform .15s',
            }}>
              {isPlaying ? <Icon name="Pause" size={18} color={C.db} fill={C.db} /> : <Icon name="Play" size={18} color={C.db} fill={C.db} style={{ marginLeft: 2 }} />}
            </button>
            <button onClick={reset} style={{ background: 'none', border: 'none', cursor: 'pointer', opacity: .6, transition: 'opacity .15s' }}>
              <Icon name="RotateCcw" size={18} color={C.wh} />
            </button>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <span style={{ fontFamily: "'Space Grotesk'", fontSize: 10, color: C.ls }}>{fmt(currentTime)}</span>
                <span style={{ fontFamily: "'Space Grotesk'", fontSize: 10, color: 'rgba(255,255,255,.4)' }}>{fmt(TOTAL)}</span>
              </div>
              <div style={{ height: 4, background: 'rgba(255,255,255,.1)', borderRadius: 99, overflow: 'hidden', position: 'relative' }}>
                <div style={{
                  height: '100%', borderRadius: 99,
                  width: `${(currentTime / TOTAL) * 100}%`,
                  background: `linear-gradient(90deg, ${C.lb} 0%, rgba(85,187,223,.4) 100%)`,
                  boxShadow: `0 0 8px ${C.lb}`,
                  transition: 'width .1s linear',
                }} />
                {scenes.map((s, i) => (
                  <div key={i} style={{
                    position: 'absolute', top: 0, bottom: 0,
                    left: `${(s.start / TOTAL) * 100}%`,
                    width: 1, background: 'rgba(255,255,255,.2)',
                  }} />
                ))}
              </div>
            </div>
          </div>
          {/* scene grid */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 4 }}>
            {scenes.map((s, i) => (
              <button key={i} onClick={() => jumpTo(i)} className={`scene-btn ${currentScene === i ? 'active' : ''}`}
                style={{ padding: '5px 2px', borderRadius: 6, cursor: 'pointer', fontFamily: "'Space Grotesk'" }}>
                {i + 1}
              </button>
            ))}
          </div>
        </div>
      );

      // ── FULLSCREEN ──
      if (fullscreen) {
        return (
          <div style={{ position: 'fixed', inset: 0, zIndex: 9999, background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
            className="noise scanlines vignette">
            {/* top bar on hover */}
            <div style={{ position: 'absolute', top: 0, inset: 'auto 0 auto 0', padding: 16, zIndex: 100, display: 'flex', justifyContent: 'center', gap: 8, opacity: 0 }}
              onMouseEnter={e => e.currentTarget.style.opacity = 1}
              onMouseLeave={e => e.currentTarget.style.opacity = 0}
              className="hoverbar">
              {scenes.map((s, i) => (
                <button key={i} onClick={() => jumpTo(i)} className={`scene-btn ${currentScene === i ? 'active' : ''}`}
                  style={{ padding: '6px 10px', borderRadius: 8, cursor: 'pointer', fontFamily: "'Space Grotesk'" }}>
                  {i + 1}
                </button>
              ))}
              <button onClick={() => setFullscreen(false)} style={{
                background: 'rgba(220,50,50,.9)', border: 'none', color: '#fff', padding: '6px 14px',
                borderRadius: 8, cursor: 'pointer', fontFamily: "'Space Grotesk'", fontWeight: 700, fontSize: 11,
                display: 'flex', alignItems: 'center', gap: 4, marginLeft: 8,
              }}>
                <Icon name="X" size={14} /> SAIR
              </button>
            </div>
            {/* full scene */}
            <div style={{ position: 'relative', width: '100%', maxWidth: 430, height: '100vh', overflow: 'hidden' }}>
              {phase === 'ready' && <SceneCmp key={`${currentScene}-${sceneKey}`} />}
            </div>
            {/* bottom controls on hover */}
            <div style={{ position: 'absolute', bottom: 30, left: '50%', transform: 'translateX(-50%)', zIndex: 100, opacity: 0 }}
              onMouseEnter={e => e.currentTarget.style.opacity = 1}
              onMouseLeave={e => e.currentTarget.style.opacity = 0}
              className="hoverbar">
              <Controls compact />
            </div>
          </div>
        );
      }

      // ── MAIN UI ──
      return (
        <div style={{
          minHeight: '100vh', background: C.bg,
          fontFamily: "'Space Grotesk', sans-serif",
          color: C.wh, padding: '28px 24px',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
        }}>

          {/* HEADER */}
          <header style={{
            width: '100%', maxWidth: 900,
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            marginBottom: 32, paddingBottom: 20,
            borderBottom: `1px solid rgba(85,187,223,.12)`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{
                padding: 10, borderRadius: 14,
                background: `linear-gradient(135deg, ${C.dt} 0%, #003530 100%)`,
                boxShadow: `0 0 24px rgba(0,82,77,.5)`,
              }}>
                <Icon name="Sparkles" color={C.ls} size={22} />
              </div>
              <div>
                <h1 style={{ margin: 0, fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 22, letterSpacing: '-0.02em' }}>
                  Hidro<span style={{ color: C.lb }}>Studio</span>
                </h1>
                <p style={{ margin: 0, fontSize: 11, color: 'rgba(255,255,255,.35)', letterSpacing: '0.15em' }}>12 CENAS · 58.2s · CINEMA MODE</p>
              </div>
            </div>
            <button onClick={() => setFullscreen(true)} style={{
              padding: '10px 22px', borderRadius: 12, cursor: 'pointer', border: 'none',
              display: 'flex', alignItems: 'center', gap: 8, fontSize: 12,
            }} className="btn-primary">
              <Icon name="MonitorPlay" size={18} /> GRAVAR TELA CHEIA
            </button>
          </header>

          {/* MAIN GRID */}
          <main style={{ width: '100%', maxWidth: 900, display: 'flex', gap: 32, flexWrap: 'wrap', justifyContent: 'center' }}>

            {/* LEFT PANEL */}
            <div style={{
              flex: 1, minWidth: 280,
              background: 'rgba(255,255,255,.03)',
              border: '1px solid rgba(85,187,223,.1)',
              borderRadius: 24, padding: 24,
              display: 'flex', flexDirection: 'column', gap: 20,
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
                <Icon name="Database" color={C.lb} size={20} />
                <h2 style={{ margin: 0, fontFamily: "'Syne'", fontWeight: 700, fontSize: 16, letterSpacing: '-0.01em' }}>Motor Narrativo</h2>
              </div>

              <p style={{ margin: 0, fontSize: 12, color: 'rgba(255,255,255,.55)', lineHeight: 1.7, borderLeft: `3px solid ${C.ls}`, paddingLeft: 12 }}>
                Ritmo <strong style={{ color: C.ls }}>TikTok/Reels</strong> — 1 cena a cada 4–5s com transições cinematográficas, partículas atmosféricas, chromatic aberration e efeitos de profundidade.
              </p>

              {/* scene list */}
              <div style={{
                background: 'rgba(0,0,0,.4)', borderRadius: 16, padding: 16,
                maxHeight: 280, overflowY: 'auto',
                border: '1px solid rgba(255,255,255,.05)',
              }}>
                {scenes.map((s, i) => (
                  <div key={i} onClick={() => phase === 'ready' && jumpTo(i)} style={{
                    display: 'flex', alignItems: 'center', gap: 10,
                    padding: '7px 6px', borderRadius: 8, cursor: phase === 'ready' ? 'pointer' : 'default',
                    background: currentScene === i && phase === 'ready' ? 'rgba(85,187,223,.1)' : 'transparent',
                    transition: 'background .2s',
                    marginBottom: 2,
                  }}>
                    <span style={{
                      width: 22, height: 22, borderRadius: 6,
                      background: currentScene === i && phase === 'ready' ? C.lb : 'rgba(255,255,255,.08)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 9, fontWeight: 700,
                      color: currentScene === i && phase === 'ready' ? C.db : 'rgba(255,255,255,.4)',
                      flexShrink: 0,
                    }}>{i + 1}</span>
                    <span style={{ fontSize: 11, color: 'rgba(255,255,255,.6)', minWidth: 36 }}>{s.start}s</span>
                    <span style={{ fontSize: 12, color: currentScene === i && phase === 'ready' ? C.lb : 'rgba(255,255,255,.75)', fontWeight: currentScene === i ? 600 : 400 }}>{s.title}</span>
                  </div>
                ))}
              </div>

              <button onClick={() => { setPhase('loading'); setProgress(0); setCurrentTime(0); setCurrentScene(0); setSceneKey(0); setIsPlaying(false); }}
                disabled={phase === 'loading'}
                style={{ padding: '14px 20px', borderRadius: 14, border: 'none', cursor: 'pointer', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}
                className="btn-primary">
                {phase === 'loading' ? (
                  <React.Fragment><Icon name="Wand2" size={20} style={{ animation: 'iconSpin 1s linear infinite' }} /> Processando {Math.round(progress)}%</React.Fragment>
                ) : (
                  <React.Fragment><Icon name="Wand2" size={20} /> {phase === 'ready' ? 'Reconstruir' : 'Construir Animação'}</React.Fragment>
                )}
              </button>
            </div>

            {/* RIGHT: PHONE + CONTROLS */}
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20 }}>
              <PhonePreview />
              <Controls />
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
